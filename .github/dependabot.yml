# Managed by DavidVeksler/dependabot-fleet
version: 2

updates:
  - package-ecosystem: "nuget"
    directories:
      - "/CryptoTracker.ConsoleApp"
      - "/CryptoTracker.Core"
      - "/Tests"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "01:10"
      timezone: "America/Denver"
    open-pull-requests-limit: 5
    groups:
      non-major-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
